<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartKuji プロジェクト資料</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4f8;color:#333;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login{background:#fff;border-radius:10px;padding:32px 36px;box-shadow:0 2px 12px rgba(0,0,0,.08);width:min(360px,92vw);}
.login h1{font-size:16px;margin-bottom:8px;color:#1a3a5c;}
.login p{font-size:12px;color:#666;margin-bottom:20px;}
.login label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:#1a3a5c;}
.login input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:14px;}
.login button{width:100%;padding:11px;border:0;border-radius:6px;background:#1e6bb8;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.login button:hover{background:#155a9a;}
.login .error{display:none;margin-top:12px;font-size:12px;color:#c62828;}
#viewer{display:none;position:fixed;inset:0;border:0;width:100%;height:100%;}
</style>
</head>
<body>
<div class="login" id="login-box">
  <h1>SmartKuji プロジェクト資料</h1>
  <p>アクセスコードを入力してください。</p>
  <form id="login-form">
    <label for="code">アクセスコード</label>
    <input id="code" type="password" autocomplete="current-password" required>
    <button type="submit">表示</button>
  </form>
  <p class="error" id="error-msg">アクセスコードが正しくありません。</p>
</div>
<iframe id="viewer" title="SmartKuji プロジェクト資料"></iframe>
<script src="app.js"></script>
</body>
</html>
